# Point this at your Android phone stream.
# IP Webcam (Android): install "IP Webcam" from Play Store, start server,
# then set camera_url to http://PHONE_IP:8080/video
camera_url: "http://192.168.1.100:8080/video"

# Fallback to a local webcam index if camera_url fails / for desk testing
camera_index: 0
prefer_phone: true

# Ball color in HSV (white ping-pong ball defaults; tweak in the web UI)
# White = low saturation, high brightness — Hue is mostly ignored when S is low
ball_hsv_lower: [0, 0, 180]
ball_hsv_upper: [180, 50, 255]

# Replay buffer length in seconds
replay_seconds: 8
replay_fps: 20

# Frame processing
process_width: 960

# Score
points_to_win: 11
must_win_by: 2
